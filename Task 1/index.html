<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Task 1</title>
  <style>
    body {
      margin: 10px;
      display: flex;
      flex-direction: column;
      text-align: center;
      gap: 10px;
      height: 95vh;
      font-family: sans-serif;
    }

    header,
    nav,
    section,
    footer {
      background-color: #e9eff5;
      border: 1px solid #d1d9e0;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    header {
      height: 80px;
    }

    nav {
      height: 50px;
    }

    footer {
      height: 60px;
    }

    section {
      display: flex;
      flex-direction: row;
      flex: 1;
      gap: 10px;
      background-color: transparent;
      border: none;
    }

    aside,
    main {
      background-color: #e9eff5;
      border: 1px solid #d1d9e0;
      display: flex;
      align-items: center;
      justify-content: center;
      height: 100%;
    }

    aside {
      flex: 1;
    }

    main {
      flex: 3;
    }
  </style>
</head>

<body>

  <header>Header</header>

  <nav>Navigation Menu</nav>

  <section>
    <aside>Content</aside>
    <main>Main Content</main>
    <aside>Content</aside>
  </section>

  <footer>Footer</footer>

</body>

</html>
